spring.application.name=devsync-backend

# --- Server (Railway/Heroku inject PORT) ---
server.port=${PORT:8080}

# --- Datasource (production: DATABASE_URL or SPRING_DATASOURCE_*) ---
# No credential defaults. Configure via environment.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Redis ---
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.password=${SPRING_REDIS_PASSWORD:}
spring.redis.ssl.enabled=${SPRING_REDIS_SSL_ENABLED:false}

# --- Auth / JWT ---
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:15}
app.jwt.guest-token-minutes=${JWT_GUEST_TOKEN_MINUTES:120}
app.refresh-token.days=${REFRESH_TOKEN_DAYS:14}
app.cookie.secure=${COOKIE_SECURE:true}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}
app.cookie.name=${REFRESH_COOKIE_NAME:refresh_token}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
app.document.snapshot-debounce-ms=${DOCUMENT_SNAPSHOT_DEBOUNCE_MS:3000}
app.document.max-content-chars=${DOCUMENT_MAX_CONTENT_CHARS:500000}
app.import.max-file-bytes=${IMPORT_MAX_FILE_BYTES:26214400}
app.import.collaboration-max-bytes=${IMPORT_COLLABORATION_MAX_BYTES:1048576}
app.import.max-total-bytes=${IMPORT_MAX_TOTAL_BYTES:104857600}
app.import.max-files=${IMPORT_MAX_FILES:2000}

# --- OAuth2 GitHub (optional; generated inert values allow startup while disabled) ---
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:${random.uuid}}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:${random.uuid}}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user
spring.security.oauth2.client.provider.github.user-name-attribute=id
app.oauth2.github.enabled=${GITHUB_OAUTH_ENABLED:false}

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.health.redis.enabled=${MANAGEMENT_HEALTH_REDIS_ENABLED:true}

server.error.include-stacktrace=never
server.error.include-message=never
