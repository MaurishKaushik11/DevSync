services:
  postgres:
    image: postgres:16-alpine
    container_name: devsync-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devsync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-devsync}
    ports:
      - "5432:5432"
    volumes:
      - devsync_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devsync} -d ${POSTGRES_DB:-devsync}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: devsync-redis
    ports:
      - "6379:6379"
    volumes:
      - devsync_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  devsync_pg_data:
  devsync_redis_data:
