spring.datasource.url=jdbc:h2:mem:devsync;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${random.uuid}${random.uuid}
app.jwt.access-token-minutes=15
app.jwt.guest-token-minutes=120
app.refresh-token.days=14
app.cookie.secure=false
app.cookie.same-site=Lax
app.frontend-url=http://localhost:5173
app.allowed-origins=http://localhost:5173
app.document.snapshot-debounce-ms=50
app.document.max-content-chars=500000
app.import.max-file-bytes=26214400
app.import.collaboration-max-bytes=1048576
app.import.max-total-bytes=104857600
app.import.max-files=2000
app.oauth2.github.enabled=false

spring.security.oauth2.client.registration.github.client-id=${random.uuid}
spring.security.oauth2.client.registration.github.client-secret=${random.uuid}

management.health.redis.enabled=false
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
