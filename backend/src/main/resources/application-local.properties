# Local demo profile — no Docker required.
# Production/staging should use PostgreSQL via DATABASE_URL / SPRING_DATASOURCE_*.

spring.datasource.url=jdbc:h2:file:./data/devsync-local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-minutes=60
app.jwt.guest-token-minutes=240
app.refresh-token.days=14
app.cookie.secure=false
app.cookie.same-site=Lax
app.frontend-url=http://localhost:5173
app.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.document.snapshot-debounce-ms=3000
app.document.max-content-chars=500000
app.import.max-file-bytes=26214400
app.import.collaboration-max-bytes=1048576
app.import.max-total-bytes=104857600
app.import.max-files=2000
app.oauth2.github.enabled=false

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:${random.uuid}}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:${random.uuid}}

spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
management.health.redis.enabled=true

logging.level.com.devsync.backend=INFO
